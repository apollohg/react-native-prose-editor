name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-and-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Typecheck example
        run: npm --prefix example run typecheck

      - name: Run JavaScript tests
        run: npm test

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Run Android unit tests
        run: npm run android:test

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios-tests

      - name: Prepare iOS simulator
        id: ios-simulator
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild -version
          xcrun simctl list runtimes available
          xcrun simctl list devicetypes

          simulator_id="$(
            python3 <<'PY'
import json
import subprocess
import sys

def run(*args):
    return subprocess.check_output(args, text=True)

def available(value):
    return value is True or value == "YES"

def parse_version(runtime):
    version = runtime.get("version")
    if isinstance(version, str):
        parts = []
        for item in version.split("."):
            try:
                parts.append(int(item))
            except ValueError:
                parts.append(0)
        return tuple(parts)

    identifier = runtime.get("identifier", "")
    suffix = identifier.split("iOS-")[-1]
    parts = []
    for item in suffix.split("-"):
        try:
            parts.append(int(item))
        except ValueError:
            parts.append(0)
    return tuple(parts)

devices = json.loads(run("xcrun", "simctl", "list", "-j", "devices", "available"))
runtimes = json.loads(run("xcrun", "simctl", "list", "-j", "runtimes", "available"))
device_types = json.loads(run("xcrun", "simctl", "list", "-j", "devicetypes"))

existing_devices = []
for runtime_devices in devices.get("devices", {}).values():
    for device in runtime_devices:
        if available(device.get("isAvailable")) and device.get("name", "").startswith("iPhone"):
            existing_devices.append(device)

if existing_devices:
    print(existing_devices[0]["udid"])
    sys.exit(0)

ios_runtimes = [
    runtime
    for runtime in runtimes.get("runtimes", [])
    if available(runtime.get("isAvailable"))
    and runtime.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS-")
]

if not ios_runtimes:
    sys.stderr.write("No available iOS simulator runtimes were found on this runner.\n")
    sys.exit(1)

ios_runtimes.sort(key=parse_version, reverse=True)
runtime = ios_runtimes[0]

preferred_device_names = [
    "iPhone 16",
    "iPhone 16 Pro",
    "iPhone 16 Pro Max",
    "iPhone 16 Plus",
    "iPhone 16e",
    "iPhone 15",
]

device_type_identifier = None
device_types_by_name = {
    device_type.get("name"): device_type.get("identifier")
    for device_type in device_types.get("devicetypes", [])
}

for name in preferred_device_names:
    identifier = device_types_by_name.get(name)
    if identifier:
        device_type_identifier = identifier
        break

if device_type_identifier is None:
    for device_type in device_types.get("devicetypes", []):
        name = device_type.get("name", "")
        identifier = device_type.get("identifier")
        if name.startswith("iPhone") and identifier:
            device_type_identifier = identifier
            break

if device_type_identifier is None:
    sys.stderr.write("No iPhone simulator device type was found on this runner.\n")
    sys.exit(1)

simulator_name = "NativeEditor CI iPhone"
udid = run(
    "xcrun",
    "simctl",
    "create",
    simulator_name,
    device_type_identifier,
    runtime["identifier"],
).strip()
print(udid)
PY
          )"

          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

          echo "Using simulator destination id=$simulator_id"
          echo "destination=id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests
        run: >
          xcodebuild test
          -workspace ios-tests/NativeEditorTests.xcworkspace
          -scheme NativeEditorTests
          -sdk iphonesimulator
          -destination '${{ steps.ios-simulator.outputs.destination }}'
