name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-and-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Typecheck example
        run: npm --prefix example run typecheck

      - name: Run JavaScript tests
        run: npm test

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Run Android unit tests
        run: npm run android:test

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios-tests

      - name: Prepare iOS simulator
        id: ios-simulator
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild -version
          runtimes="$(xcrun simctl list runtimes available)"
          device_types="$(xcrun simctl list devicetypes)"
          devices="$(xcrun simctl list devices available)"

          printf '%s\n' "$runtimes"
          printf '%s\n' "$device_types"

          simulator_id="$(
            printf '%s\n' "$devices" \
              | sed -nE 's/^[[:space:]]+iPhone[^()]* \(([0-9A-F-]+)\) \((Booted|Shutdown|Creating)\)$/\1/p' \
              | head -n 1
          )"

          if [ -z "$simulator_id" ]; then
            runtime_identifier="$(
              printf '%s\n' "$runtimes" \
                | grep '^iOS ' \
                | tail -n 1 \
                | sed -nE 's/^.* - (com\.apple\.CoreSimulator\.SimRuntime\.iOS-[^[:space:]]+)$/\1/p'
            )"

            if [ -z "$runtime_identifier" ]; then
              echo "No available iOS simulator runtimes were found on this runner." >&2
              exit 1
            fi

            device_type_identifier=""
            for preferred_name in \
              "iPhone 16" \
              "iPhone 16 Pro" \
              "iPhone 16 Pro Max" \
              "iPhone 16 Plus" \
              "iPhone 16e" \
              "iPhone 15"
            do
              device_type_identifier="$(
                printf '%s\n' "$device_types" \
                  | sed -nE "s/^${preferred_name} \\((com\\.apple\\.CoreSimulator\\.SimDeviceType\\.[^)]+)\\)$/\\1/p" \
                  | head -n 1
              )"
              if [ -n "$device_type_identifier" ]; then
                break
              fi
            done

            if [ -z "$device_type_identifier" ]; then
              device_type_identifier="$(
                printf '%s\n' "$device_types" \
                  | sed -nE 's/^iPhone[^()]* \((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\)$/\1/p' \
                  | head -n 1
              )"
            fi

            if [ -z "$device_type_identifier" ]; then
              echo "No iPhone simulator device type was found on this runner." >&2
              exit 1
            fi

            simulator_id="$(
              xcrun simctl create "NativeEditor CI iPhone" "$device_type_identifier" "$runtime_identifier"
            )"
          fi

          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

          echo "Using simulator destination id=$simulator_id"
          echo "destination=id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests
        run: >
          xcodebuild test
          -workspace ios-tests/NativeEditorTests.xcworkspace
          -scheme NativeEditorTests
          -sdk iphonesimulator
          -destination '${{ steps.ios-simulator.outputs.destination }}'
