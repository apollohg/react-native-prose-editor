name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-and-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Typecheck example
        run: npm --prefix example run typecheck

      - name: Run JavaScript tests
        run: npm test

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Run Android unit tests
        run: npm run android:test

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm --prefix example ci

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios-tests

      - name: Select iOS simulator
        id: ios-simulator
        shell: bash
        run: |
          set -euo pipefail

          destinations="$(xcodebuild -workspace ios-tests/NativeEditorTests.xcworkspace -scheme NativeEditorTests -showdestinations)"

          simulator_id="$(
            printf '%s\n' "$destinations" \
              | sed -nE "/platform:iOS Simulator/ { /placeholder/! { /name:iPhone/ s/.*id:([^,]+),.*/\\1/p; } }" \
              | head -n 1
          )"

          if [ -z "$simulator_id" ]; then
            simulator_id="$(
              printf '%s\n' "$destinations" \
                | sed -nE "/platform:iOS Simulator/ { /placeholder/! s/.*id:([^,]+),.*/\\1/p; }" \
                | head -n 1
            )"
          fi

          if [ -z "$simulator_id" ]; then
            echo "Unable to find a concrete iOS simulator destination for NativeEditorTests." >&2
            printf '%s\n' "$destinations"
            exit 1
          fi

          echo "Using simulator destination id=$simulator_id"
          echo "destination=id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests
        run: >
          xcodebuild test
          -workspace ios-tests/NativeEditorTests.xcworkspace
          -scheme NativeEditorTests
          -destination '${{ steps.ios-simulator.outputs.destination }}'
